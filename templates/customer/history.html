{% extends "base.html" %}
{% block content %}

<style>
.container {
    max-width: 900px;
    margin: 40px auto;
}

/* Top bar */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.back-btn {
    background: #dc2626; /* red */
    color: white;
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
}

.back-btn:hover {
    background: #b91c1c;
}

.card {
    background: #ffffff;
    padding: 28px;
    border-radius: 14px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.08);
}

h2 {
    margin: 0;
    color: #111827;
}

/* Timeline */
.timeline {
    position: relative;
    padding-left: 30px;
    margin-top: 20px;
}

.timeline::before {
    content: "";
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #e5e7eb;
}

.event {
    position: relative;
    margin-bottom: 22px;
    padding-left: 20px;
}

.event::before {
    content: "";
    position: absolute;
    left: -2px;
    top: 6px;
    width: 14px;
    height: 14px;
    background: #2563eb;
    border-radius: 50%;
}

.event-action {
    font-weight: 600;
    color: #1f2937;
}

.event-time {
    font-size: 13px;
    color: #6b7280;
    margin-top: 4px;
}
</style>

<div class="container">

    <!-- 🔴 TOP BAR -->
    <div class="top-bar">
        <h2>Your Activity History</h2>
        <a href="{% url 'accounts:customer_dashboard' %}" class="back-btn">
            ← Back to Dashboard
        </a>
    </div>

    <div class="card">

        {% if history %}
            <div class="timeline">
                {% for log in history %}
                    <div class="event">
                        <div class="event-action">
                            {{ log.action }}
                        </div>
                        <div class="event-time">
                            {{ log.created_at|date:"d M Y, h:i A" }}
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p style="color:#6b7280;">No activity recorded yet.</p>
        {% endif %}

    </div>
</div>

{% endblock %}
