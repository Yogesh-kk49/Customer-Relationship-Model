{% extends "base.html" %}
{% block content %}

<style>
.container {
    max-width: 900px;
    margin: 30px auto 60px;
    padding: 0 20px;
}

/* Top bar */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
}

.back-btn {
    background: #dc2626; /* red */
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 13.5px;
    transition: all 0.2s ease;
}

.back-btn:hover {
    background: #b91c1c;
    transform: translateY(-1px);
}

.card {
    background: #ffffff;
    padding: 28px;
    border-radius: 14px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    opacity: 0;
    animation: cardIn 0.35s ease forwards;
}

@keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    margin: 0;
    color: #111827;
}

/* Timeline */
.timeline {
    position: relative;
    padding-left: 30px;
    margin-top: 20px;
}

.timeline::before {
    content: "";
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #e5e7eb;
}

.event {
    position: relative;
    margin-bottom: 22px;
    padding-left: 20px;
    opacity: 0;
    animation: eventIn 0.35s ease forwards;
}

@keyframes eventIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
}

.event::before {
    content: "";
    position: absolute;
    left: -2px;
    top: 6px;
    width: 14px;
    height: 14px;
    background: #2563eb;
    border-radius: 50%;
    box-shadow: 0 0 0 4px #eff6ff;
    transition: transform 0.2s ease;
}

.event:hover::before {
    transform: scale(1.2);
}

.event-action {
    font-weight: 600;
    color: #1f2937;
}

.event-time {
    font-size: 13px;
    color: #6b7280;
    margin-top: 4px;
}

.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #9ca3af;
}
.empty-state .empty-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
}
</style>

<div class="container">

    <div class="top-bar">
        <h2>Your Activity History</h2>
        <a href="{% url 'accounts:customer_dashboard' %}" class="back-btn">
            ← Back to Dashboard
        </a>
    </div>

    <div class="card">

        {% if history %}
            <div class="timeline">
                {% for log in history %}
                    <div class="event" style="animation-delay: calc({{ forloop.counter0 }} * 40ms);">
                        <div class="event-action">
                            {{ log.action }}
                        </div>
                        <div class="event-time">
                            {{ log.created_at|date:"d M Y, h:i A" }}
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="empty-state">
                <span class="empty-icon">🕓</span>
                No activity recorded yet.
            </div>
        {% endif %}

    </div>
</div>

{% endblock %}
