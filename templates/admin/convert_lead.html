{% extends "base.html" %}
{% load static %}

{% block content %}

<style>
    .container {
        max-width: 700px;
        margin: 60px auto;
    }

    .card {
        background: #ffffff;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    /* 🔝 TOP BAR */
    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    h2 {
        color: #1f2937;
        margin: 0;
    }

    /* 🔴 BACK BUTTON */
    .back-btn {
        background: #dc2626;
        color: white;
        padding: 8px 14px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
    }

    .back-btn:hover {
        background: #b91c1c;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #374151;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        font-size: 15px;
    }

    .btn-group {
        display: flex;
        justify-content: flex-end;
        margin-top: 25px;
    }

    .btn-primary {
        background: #2563eb;
        color: white;
        padding: 12px 20px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-weight: 600;
    }

    .btn-primary:hover {
        background: #1d4ed8;
    }

    .msg {
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 6px;
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
        font-weight: 500;
    }
</style>

<div class="container">
    <div class="card">

        <!-- 🔝 HEADER -->
        <div class="top-bar">
            <h2>Convert Lead to Customer</h2>
            <a href="{% url 'accounts:leads' %}" class="back-btn">
                ← Back to Leads
            </a>
        </div>

        <!-- 🔴 ERROR / SUCCESS MESSAGES -->
        {% if messages %}
            {% for message in messages %}
                <div class="msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- ✅ EMAIL -->
            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ entered_email|default:lead.email }}"
                    required
                >
            </div>

            <!-- ✅ USERNAME -->
            <div class="form-group">
                <label>Username</label>
                <input
                    type="text"
                    name="new_username"
                    placeholder="Create username"
                    value="{{ new_username|default:'' }}"
                    required
                >
            </div>

            <!-- ✅ PASSWORD -->
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-primary">
                    Convert Lead
                </button>
            </div>
        </form>

    </div>
</div>

{% endblock %}
