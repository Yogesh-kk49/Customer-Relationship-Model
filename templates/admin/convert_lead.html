{% extends "base.html" %}
{% load static %}

{% block content %}

<style>
    .container {
        max-width: 700px;
        margin: 30px auto 60px;
        padding: 0 20px;
    }

    .card {
        background: #ffffff;
        padding: 35px;
        border-radius: 14px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        opacity: 0;
        animation: cardIn 0.35s ease forwards;
    }

    @keyframes cardIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* 🔝 TOP BAR */
    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        flex-wrap: wrap;
        gap: 12px;
    }

    h2 {
        color: #1f2937;
        margin: 0;
    }

    /* 🔴 BACK BUTTON */
    .back-btn {
        background: #dc2626;
        color: white;
        padding: 9px 16px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        font-size: 13.5px;
        transition: all 0.2s ease;
    }

    .back-btn:hover {
        background: #b91c1c;
        transform: translateY(-1px);
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #374151;
        font-size: 13.5px;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1.5px solid #d1d5db;
        font-size: 15px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    .btn-group {
        display: flex;
        justify-content: flex-end;
        margin-top: 25px;
    }

    .btn-primary {
        background: #2563eb;
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s ease;
    }

    .btn-primary:hover {
        background: #1d4ed8;
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(37,99,235,0.28);
    }

    .msg {
        padding: 12px 16px;
        margin-bottom: 15px;
        border-radius: 8px;
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
        font-weight: 500;
        animation: msgSlide 0.3s ease;
    }

    @keyframes msgSlide {
        from { opacity: 0; transform: translateY(-6px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="container">
    <div class="card">

        <!-- 🔝 HEADER -->
        <div class="top-bar">
            <h2>Convert Lead to Customer</h2>
            <a href="{% url 'accounts:leads' %}" class="back-btn">
                ← Back to Leads
            </a>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" onsubmit="return confirm('Convert this lead into a customer? This action will create a new customer record.');">
            {% csrf_token %}

        
            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ entered_email|default:lead.email }}"
                    required
                >
            </div>

           
            <div class="form-group">
                <label>Username</label>
                <input
                    type="text"
                    name="new_username"
                    placeholder="Create username"
                    value="{{ new_username|default:'' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input
                    type="text"
                    name="mobile"
                    placeholder="10-digit mobile number"
                    pattern="[0-9]{10}"
                    title="Enter a 10-digit mobile number"
                    maxlength="10"
                    inputmode="numeric"
                    oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
                    value="{{ entered_mobile|default:'' }}"
                >
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-primary">
                    Convert Lead
                </button>
            </div>
        </form>

    </div>
</div>

{% endblock %}
